apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: service-monitor
  labels:
    monitoring.opendatahub.io/scrape: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: ogx-operator
      app.kubernetes.io/part-of: ogx
  endpoints:
  - targetPort: metrics
    path: /metrics
    interval: 60s
