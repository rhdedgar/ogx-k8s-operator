# CRD Schema Contract: LlamaStackDistribution v1alpha2
#
# This file defines the v1alpha2 spec structure as a reference schema.
# The actual CRD is generated by kubebuilder from Go type definitions.
# This contract is used for validation during design and review.

apiVersion: llamastack.io/v1alpha2
kind: LlamaStackDistribution
metadata:
  name: example
spec:
  # --- Distribution (required, one of name or image) ---
  distribution:
    name: string          # Mapped distribution name (mutually exclusive with image)
    image: string         # Direct container image reference (mutually exclusive with name)

  # --- Providers (optional, mutually exclusive with overrideConfig) ---
  providers:
    inference: "[]ProviderConfig"      # Always a list (single provider = one-element list)
    safety: "[]ProviderConfig"
    vectorIo: "[]ProviderConfig"
    toolRuntime: "[]ProviderConfig"
    telemetry: "[]ProviderConfig"

  # ProviderConfig schema:
  # - id: string (required when list has >1 element; auto-generated for single-element lists)
  # - provider: string (required, maps to provider_type with remote:: prefix)
  # - endpoint: string (optional, maps to config.url)
  # - apiKey: SecretKeyRef (optional, resolved to env var)
  # - secretRefs: map[string]SecretKeyRef (optional, named secret references resolved to env vars)
  # - settings: map[string]any (optional, escape hatch merged into config, NO secret resolution)

  # --- Resources (optional, mutually exclusive with overrideConfig) ---
  resources:
    models:               # []ModelConfig
      - name: string      # Required: model identifier
        provider: string  # Provider ID reference (optional, defaults to first inference provider)
        contextLength: int
        modelType: string
        quantization: string
    tools:
      - string            # Tool group names
    shields:
      - string            # Shield names

  # --- Storage (optional, mutually exclusive with overrideConfig) ---
  storage:
    kv:
      type: string        # Enum: sqlite, redis (default: sqlite)
      endpoint: string    # Required for redis
      password:           # SecretKeyRef, optional
        secretKeyRef:
          name: string
          key: string
    sql:
      type: string        # Enum: sqlite, postgres (default: sqlite)
      connectionString:   # SecretKeyRef, required for postgres
        secretKeyRef:
          name: string
          key: string

  # --- Disabled APIs (optional, mutually exclusive with overrideConfig) ---
  disabled:
    - string              # API names to disable (e.g., postTraining, eval)

  # --- Networking (optional) ---
  networking:
    port: int32           # Default: 8321
    tls:
      enabled: bool
      secretName: string  # K8s TLS Secret reference
      caBundle:
        configMapName: string
        configMapNamespace: string  # Optional, defaults to CR namespace
        configMapKeys: [string]     # Optional, defaults to ca-bundle.crt
    externalAccess:
      enabled: bool       # Enable external access (default: false)
      hostname: string    # Custom hostname for external endpoint (optional)
    allowedFrom:
      namespaces: [string]
      labels: [string]    # Namespace label keys for NetworkPolicy

  # --- Workload (optional) ---
  workload:
    replicas: int32       # Default: 1
    workers: int32        # Uvicorn worker count
    resources:            # corev1.ResourceRequirements
      requests: {cpu: string, memory: string}
      limits: {cpu: string, memory: string}
    autoscaling:
      minReplicas: int32
      maxReplicas: int32
      targetCPUUtilizationPercentage: int32
      targetMemoryUtilizationPercentage: int32
    storage:              # PVC for persistent data
      size: string        # e.g., "10Gi"
      mountPath: string   # Default: "/.ogx"
    podDisruptionBudget:
      minAvailable: IntOrString
      maxUnavailable: IntOrString
    topologySpreadConstraints: []  # corev1.TopologySpreadConstraint
    overrides:
      serviceAccountName: string
      env: []             # corev1.EnvVar
      command: [string]
      args: [string]
      volumes: []         # corev1.Volume
      volumeMounts: []    # corev1.VolumeMount

  # --- External Providers (from spec 001) ---
  externalProviders:
    inference:
      - providerId: string
        image: string

  # --- Override Config (mutually exclusive with providers, resources, storage, disabled) ---
  overrideConfig:
    configMapName: string

# --- CEL Validation Rules ---
# Mutual exclusivity:
# 1. !(has(self.providers) && has(self.overrideConfig))
# 2. !(has(self.resources) && has(self.overrideConfig))
# 3. !(has(self.storage) && has(self.overrideConfig))
# 4. !(has(self.disabled) && has(self.overrideConfig))
# 5. !(has(self.distribution.name) && has(self.distribution.image))
#
# Provider ID validation (now feasible because providers are typed slices):
# 6. Per-type: self.providers.inference.size() <= 1 || self.providers.inference.all(p, has(p.id))
#    (same rule for safety, vectorIo, toolRuntime, telemetry)
# 7. All provider IDs unique across all provider types (union of all IDs has no duplicates)
#
# Disabled + provider conflict:
# 8. No provider type may appear in both providers and disabled
#    e.g., !(has(self.providers.inference) && self.providers.inference.size() > 0 && self.disabled.exists(d, d == 'inference'))
#
# Conditional field requirements:
# 9.  !has(self.networking.tls) || !self.networking.tls.enabled || has(self.networking.tls.secretName)
# 10. !has(self.storage.kv) || self.storage.kv.type != 'redis' || has(self.storage.kv.endpoint)
# 11. !has(self.storage.sql) || self.storage.sql.type != 'postgres' || has(self.storage.sql.connectionString)
